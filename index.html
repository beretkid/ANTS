<head>
  <title>Ants</title>

</head>
<script>
canvas = document.getElementById('visuals');
  ctx = canvas.getContext("2d",{ willReadFrequently: true });
  



canvas.width = window.innerWidth * 1
canvas.height = window.innerHeight * 1
var w = canvas.width;
var h = canvas.height;
var entities = []
var food = []
var treeColor = "rgb(155,0,0)"
var treeHighlight = "rgb(185,0,0)"
var i1
var allowskipping = true
var foodCount = 0
var totalAnts=0
var zSize=10
var menu=document.getElementById("menu")
const mod = (n, m) => ((n % m) + m) % m;
const mean = (l) => l.reduce((a, b) => a + b, 0) / l.length;
function hexToRgb(hex) {
  // Remove the hash if it exists
  hex = hex.replace(/^#/, '');

  // Extract the red, green, and blue components
  const r = parseInt(hex.substring(0, 2), 16);
  const g = parseInt(hex.substring(2, 4), 16);
  const b = parseInt(hex.substring(4, 6), 16);

  return { r, g, b };
}
function slowDarken(color,amnt) {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
	 jump=4
	 amnt=settings.fadeAmount
	 start=0
    for (let i = start; i < data.length; i += jump) {
	 
        if (data[i] > 0) data[i] -= Math.sign(data[i]-color.r,settings.fadeAmount)*amnt   // Red
        if (data[i+1] > 0) data[i+1] -= Math.sign(data[i+1]-color.g,settings.fadeAmount)*amnt    // Green
        if (data[i+2] > 0) data[i+2] -= Math.sign(data[i+2]-color.b,settings.fadeAmount)  *amnt  // Blue
		  if (isNaN(data[i])) console.log("PANIC!!")
		  
    }
    ctx.putImageData(imageData, 0, 0);
}

function random(min, max,snap) {

if (snap==undefined){
snap=1
}

if (snap<0||snap==0){
  return (Math.random() * ((max-1) - min + 1)) + min;
}else{
  min = Math.ceil(min*snap)/snap;
  max = Math.floor(max*snap)/snap;
  return (Math.floor((Math.random() * (max - min + 1))*snap)/snap) + min;
  }
}
 function calculateDistance(x1, y1, x2, y2) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        return Math.sqrt(dx * dx + dy * dy);
    }
function assembleRGB(r1,r2,r3) {
return "rgb(" + r1 + ", " + r2+ ", " + r3 + ")"
}
function birthAnt(faction,x=random(0,w),y=random(0,h),c1=random(0,225),c2=random(0,225),c3=random(0,225),t=0,mutations={moveType:0}) {
faction.ants+=1
totalAnts+=1
entities.push({faction:faction,x:x,y:y,c1:c1,c2:c2,c3:c3,life:random(7500,30000),food:false,lastrng:50,food:10000,t:t,mutations:mutations,visited:[],reinforced:0,alt:false,born:gt,behavior:{target:{x:x,y:y,amnt:1},bType:0},acc:120})


}
    function isNear(x1, y1, x2, y2, threshold) {
        const distance = calculateDistance(x1, y1, x2, y2);
        return distance <= threshold;
    }
var gt=0
const cellSize = 10; // Adjust based on ant interaction range
let spatialMap = new Map();

function updateSpatialMap() {
    spatialMap.clear();
    for (let ant of entities) {
        const key = `${Math.floor(ant.x / cellSize)},${Math.floor(ant.y / cellSize)}`;
        if (!spatialMap.has(key)) spatialMap.set(key, []);
        spatialMap.get(key).push(ant);
    }
}

function tick() {

//Wordgen

updateSpatialMap()
if (settings.erode){
rng=random(100,1000)
ctx.fillStyle=settings.bColor
ctx.globalAlpha = 0.25; 
for (let i = 0; i < rng; i++) {
ctx.globalAlpha = random(0,1,1,0); 
ctx.fillRect(random(0,w),random(0,h),1,1)
}
ctx.globalAlpha = 1;
}
if (settings.fade&&gt%10==5){
ctx.fillStyle=settings.bColor
ctx.globalAlpha = settings.fadeAmount;
slowDarken(hexToRgb(settings.bColor),settings.fadeAmount)

}
ctx.globalAlpha = 1;
for (i in entities) {
curr = entities[i]

if (isNaN(curr.life)||curr.life<0){curr.remove=true;totalAnts-=1;curr.faction.ants-=1}
antBrain(curr)

}
entities = entities.filter((ent) => !ent.remove);
}

settings = {fadeAmount:1,showAnts:false,doubleTap:true,startingAnts:18,mutations:5,erode:false,fade:true,gameSpeed:0,bColor:"#000000",fadeStages:5,forceType:0}
//make settings button
for (i in settings) {
newDiv = document.createElement('div')
menu.appendChild(newDiv)
newDiv.innerText=String(i)
newButt = document.createElement('input');

newDiv.appendChild(newButt)

newButt.value=settings[i]
newButt.checked=!!settings[i]
newButt.ref=String(i)

type=String(typeof settings[i])
console.log(type,settings[i])

if (type == 'boolean'){newButt.type="checkbox";}
if (type == 'number'){newButt.type="number";}
if (type == 'string'){newButt.type="color";}
newButt.addEventListener('input', (evnt) => {
settings[event.target.ref]=event.target.value
if (event.target.type=="checkbox"){settings[event.target.ref]=!!event.target.checked}
})
}
ctx.fillStyle=settings.bColor
ctx.fillRect(0,0,w,h)
//PLant the seeds of poopshittery
factions=[]
for (let i = 0; i < settings.startingAnts; i++) {
rx=random(0,w)
ry=random(0,h)
fac=factions.push({ants:0,targ:{x:rx,y:ry}})
console.log(fac,factions[i])
birthAnt(factions[i],rx,ry)
}

var tStart=0
var tickDelay=0
var tdSlow=0
function tickRepeat() {

nx = random(0,w)
ny = random(0,h)



tStart=Date.now()
gt+=1
tick()
if (settings.doubletap){tick()}
setTimeout(()=> {
tickDelay=Math.abs((Date.now()-tStart))-settings.gameSpeed
diff=((tickDelay-tdSlow)/100)
tdSlow=tdSlow+Math.max(Math.min(Math.abs(diff),10),0.1)*Math.sign(diff)
if ((gt%10)==5){}

document.getElementById("fps").innerText="DPT: "+Math.round(tdSlow)+"/"+settings.gameSpeed+"ms"
tickRepeat()
},settings.gameSpeed)
}
document.addEventListener('keydown',function (e){
console.log(e)
if (e.keyCode==77){menu.hidden=!menu.hidden}

})
var gameSpeed=0
function antBrain(curr) {
ctx.fillStyle = assembleRGB(curr.c1,curr.c2,curr.c3)
if ((gt%10)==5&&!random(-2,2)){
curr.behavior.target.x=curr.faction.targ.x
curr.behavior.target.y=curr.faction.targ.y
curr.behavior.target.amnt=1
curr.acc=120
}
ctx.fillRect(Math.round(curr.x),Math.round(curr.y),1,1)
moves=move(curr.mutations.moveType,curr.t,curr)
//start lookin for the other ants
  const gridX = Math.floor(curr.x / cellSize);
    const gridY = Math.floor(curr.y / cellSize);
if (!random(-5,5)) {
for (let x = -1; x <= 1; x++) {
        for (let y = -1; y <= 1; y++) {
            const key = `${gridX + x},${gridY + y}`;
            const neighbors = spatialMap.get(key);

            if (neighbors) {
                for (let other of neighbors) {
                    if (curr === other) continue; // Don't touch yourself (weirdo)
                    
                    // Epic swag inter-ant shennanigans
                    let dx = curr.x - other.x;
                    let dy = curr.y - other.y;
                    let distSq = dx*dx + dy*dy;
                    
                    if (distSq < 4&&curr.faction!==other.faction&&!random(-5,5)) { // Ant on ant violence, but only if you are a different r--			
						  
						  other.life-=1000
                        
                        
                    }
						  if (distSq < 4&&curr.faction==other.faction&&!random(-5,5)) {	//2020 all over again..	
						  curr.acc=10
						  curr.behavior.target={x:other.x,y:other.y,amnt:-1}
                      
                        
                    }
                }
            }
        }
    }
	 }

if (random(0,1000)==500){birthAntFromParent(curr);curr.life-=100}
curr.x=mod(curr.x+moves.x,w)
curr.y=mod(curr.y+moves.y,h)

//tile visiting shenanagins
newTileFound=true
for (i3 in curr.visited) {
c=curr.visited[i3]
rx=Math.round(curr.x/zSize)*zSize
ry=Math.round(curr.y/zSize)*zSize
if (rx==c.x&&ry==c.y) {

newTileFound=false
}
}
if (newTileFound){
curr.visited.push({x:Math.round(curr.x/zSize)*zSize,y:Math.round(curr.y/zSize)*zSize})
}else{curr.reinforce+=1}
//actions



curr.life-= 3+(totalAnts/100)
if (settings.showAnts) {//draw the ant itself
b=(30000-curr.life)/3000
grey=mean([curr.c1,curr.c2,curr.c3])

ctx.fillStyle = assembleRGB(curr.c1 - (curr.c1-grey)/b,curr.c2 - (curr.c2-grey)/b,curr.c3 - (curr.c3-grey)/b)
ctx.fillRect(Math.round(curr.x),Math.round(curr.y),1,1)
}
}

function birthAntFromParent(parent) {
nMuta=structuredClone(parent.mutations)
for (i2 in nMuta) {
cMuta=nMuta[i2]
if (!random(-10,10)){nMuta[i2]=mod(nMuta[i2]+random(-1,1),settings.mutations)}
}

birthAnt(parent.faction,parent.x,parent.y,parent.c1+random(-1,1),parent.c2+random(-1,1),parent.c3+random(-1,1),parent.t,nMuta)
}
acc=120
function pointAt(startX, startY, targetX, targetY,o) {
if(!o){
o=0
}
return Math.atan2(startX-targetX,startY-targetY)+o
}


function move(c,t,c2) {
forceType=settings.forceType
if (forceType){c2.mutations.moveType=forceType}
nx=0
ny=0
nt=0
tDir=(pointAt(c2.behavior.target.x,c2.behavior.target.y,c2.x,c2.y)/(Math.PI/180))*Math.sign(curr.behavior.target.amnt)
//console.log(tDir,c2.behavior.target)
if (c2.mutations.moveType==-1||!c2.mutations.moveType||c2.mutations.moveType==0){//type 0 -random direction

curr.t=tDir+random(-Math.abs(curr.acc),Math.abs(curr.acc))

rDist=random(0,curr.behavior.target.amnt,0)

nx = Math.sin(curr.t)*rDist
ny = Math.cos(curr.t)*rDist

}
if (c2.mutations.moveType==1){//type 1 -shots

curr.t+=random(-0.1,0.1,0)+(Math.sign(curr.t-tDir)/100)
rDist=random(0,0.1,0)
nx = Math.sin(c2.t)*rDist
ny = Math.cos(c2.t)*rDist

}
if (c2.mutations.moveType==2){//type 2 -dither

nx=Math.sign(random(-1,1,0))
ny=Math.sign(random(-1,1,0))
}
if (c2.mutations.moveType==3){//type 3 -fill
if ((gt+c2.born)%100==random(50,65)){
curr.t+=random(-90,90,0)+(Math.sign(curr.t-tDir)/100)
}
rDist=random(0,0.5,0)
nx = Math.sin(c2.t)*rDist
ny = Math.cos(c2.t)*rDist
}




return {x:nx,y:ny,t:nt}
}
 tickRepeat()
</script>
